name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.build.outputs.version_name }}
      version_code: ${{ steps.build.outputs.version_code }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Decode keystore
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          echo "${{ env.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
        shell: bash

      - name: Build release APK
        id: build
        run: |
          if [ -f app/release.keystore ]; then
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=app/release.keystore \
              -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          else
            ./gradlew assembleRelease --no-daemon
          fi
          
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "1.0.0")
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' app/build.gradle.kts || echo "1")
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-v${{ steps.build.outputs.version_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk-v${{ needs.build-release.outputs.version_name }}
          path: release/

      - name: Generate Release Notes
        id: release-notes
        run: |
          CHANGELOG=$(cat CHANGELOG.md 2>/dev/null | head -50 || echo "See CHANGELOG.md for details")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-release.outputs.version_name }}
          name: Release v${{ needs.build-release.outputs.version_name }}
          body: |
            ## Downloads
            
            📥 **Download APK:** app-release.apk
            
            ## Changes
            
            ${{ steps.release-notes.outputs.changelog }}
          files: release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
